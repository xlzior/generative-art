pre-commit:
  parallel: true
  jobs:
    - name: biome format & lint
      run: pnpm biome check --write {staged_files}
      glob: "*.{js,ts,tsx,jsx,json,css}"
      stage_fixed: true
    - name: type check
      run: pnpm tsc --noEmit
    - name: unit tests
      run: pnpm test:run
    - name: visual regression tests
      run: pnpm test:visual
